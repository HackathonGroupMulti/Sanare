services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sanare
      POSTGRES_PASSWORD: sanare
      POSTGRES_DB: sanare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: sqlite
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  vllm:
    image: vllm/vllm-openai:latest
    command: ["--model", "Qwen/Qwen2.5-7B-Instruct", "--port", "8001"]
    ports:
      - "8001:8001"
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

volumes:
  postgres_data:
  qdrant_data:

